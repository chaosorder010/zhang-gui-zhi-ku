# RAG 检索评估数据集 — 掌柜智库
#
# 每条 query 对应一个已知答案 (relevant_texts), 答案来自已入库的文档 chunk。
# 评估时 hybrid_search 返回 top-K, 命中 relevant_texts 中任一条即视为召回成功。
#
# 类型 (type):
#   tech_spec       技术参数问  — 数值 / 规格 / 公差
#   error_code      故障码问    — 错误码含义 / 排查步骤
#   item_specific   主体相关问  — 特定机型 / 配件
#   generic_context 通用问      — 概念 / 对比 / 原理
#
# 维护约定:
#   - query_id 全局唯一, 新增不删旧 (便于跨版本对比)
#   - relevant_texts 是入库 chunk 的精确文本片段 (substring 匹配)
#   - item_name 对应 Milvus 中的主体过滤字段, 无特定主体留 null

