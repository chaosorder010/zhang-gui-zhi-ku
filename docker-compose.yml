services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zgzk-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: zgzk-frontend
    ports:
      - "5173:80"
    volumes:
      - ./apps/frontend:/usr/share/nginx/html/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
